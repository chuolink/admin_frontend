name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - "production"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GITOPS_REPO: chuolink/portainer_gitops
  GITOPS_BRANCH: production
  GITOPS_PATH: prod/chuolink/docker-compose.yml

jobs:
  build-publish-deploy:
    name: build and push docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: checkout
      uses: actions/checkout@v3

    - name: Set up Docker Builds
      uses: docker/setup-buildx-action@v2

    - name: Handle environment files
      run: |
        rm -f .env
        cp .env.prod .env

    - name: Login to Container registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@69f6fc9d46f2f8bf0d5491e4aabe0bb8c6a4678a
      with:
        images: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=ref,event=pr
          type=sha
        flavor: |
          latest=auto
          prefix=
          suffix=

    - name: Build and push hash tagged image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
        build-args: |
          ENV_FINGERPRINT=${{ hashFiles('.env.production') }}
          ENV_FILE=.env.prod

  update-gitops:
    needs: build-publish-deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'
    steps:
    - name: Extract short SHA
      id: sha
      run: echo "short_sha=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

    - name: Checkout GitOps repository
      uses: actions/checkout@v4
      with:
        repository: ${{ env.GITOPS_REPO }}
        token: ${{ secrets.GITOPS_TOKEN }}
        path: gitops

    - name: Update docker-compose.yml
      run: |
        cd gitops
        sed -i "s|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:.*|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short_sha }}|g" ${{ env.GITOPS_PATH }}
        echo "Updated ${{ env.GITOPS_PATH }} content:"
        cat ${{ env.GITOPS_PATH }}

    - name: Commit and push changes
      run: |
        cd gitops
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add ${{ env.GITOPS_PATH }}
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update ${{ env.IMAGE_NAME }} image to ${{ steps.sha.outputs.short_sha }}"
          git push
          echo "Changes committed and pushed successfully"
        fi
