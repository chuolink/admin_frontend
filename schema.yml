          type: string
        description: cuid-format identifier for this entity.
      - in: query
        name: consultation_type
        schema:
          type: string
          enum:
          - IN_PERSON
          - PHONE
          - VIDEO
        description: |-
          * `IN_PERSON` - In Person
          * `PHONE` - Phone
          * `VIDEO` - Video
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: outcome
        schema:
          type: string
          nullable: true
          enum:
          - FOLLOW_UP_NEEDED
          - INTERESTED
          - NEEDS_TIME
          - NOT_INTERESTED
          - READY_TO_APPLY
        description: |-
          * `INTERESTED` - Interested
          * `NEEDS_TIME` - Needs More Time
          * `NOT_INTERESTED` - Not Interested
          * `READY_TO_APPLY` - Ready to Apply
          * `FOLLOW_UP_NEEDED` - Follow-up Needed
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - CANCELLED
          - COMPLETED
          - IN_PROGRESS
          - NO_SHOW
          - SCHEDULED
        description: |-
          * `SCHEDULED` - Scheduled
          * `IN_PROGRESS` - In Progress
          * `COMPLETED` - Completed
          * `CANCELLED` - Cancelled
          * `NO_SHOW` - No Show
