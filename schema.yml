    get:
      operationId: student_reminders_list
      description: Student views their reminders and marks them as read.
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: priority
        schema:
          type: string
          enum:
          - HIGH
          - LOW
          - NORMAL
          - URGENT
        description: |-
          * `LOW` - Low
          * `NORMAL` - Normal
          * `HIGH` - High
          * `URGENT` - Urgent
      - in: query
        name: reminder_type
        schema:
          type: string
          enum:
          - DOCUMENT_NEEDED
          - GENERAL
          - PAYMENT_DUE
          - PAYMENT_OVERDUE
          - SCHEDULE_UPCOMING
          - STAGE_ACTION
        description: |-
          * `PAYMENT_DUE` - Payment Due
          * `PAYMENT_OVERDUE` - Payment Overdue
          * `DOCUMENT_NEEDED` - Document Needed
          * `SCHEDULE_UPCOMING` - Upcoming Appointment
          * `STAGE_ACTION` - Stage Action Required
          * `GENERAL` - General Reminder
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - student
      responses:
        '200':
          content:
            application/json:
              schema:
