  /api/v1/webhooks/snippe/:
    get:
      operationId: webhooks_snippe_retrieve
      description: |-
        Snippe payment webhook handler.

        How to configure:
        1. Webhook URL: https://your-api-domain.com/api/v1/webhooks/snippe/
        2. Set SNIPPE_WEBHOOK_SECRET in .env from dashboard: API Settings (webhook signing key).
        3. Snippe sends: X-Webhook-Signature (HMAC-SHA256), X-Webhook-Timestamp, X-Webhook-Event.
           Body: data.reference, data.external_reference, data.status, data.failure_reason.

        Verification: message = "{timestamp}.{raw_body}", HMAC-SHA256(secret, message) == signature.
        We find the MobileTransactionModel by snippe_reference, then update status from
        X-Webhook-Event (e.g. payment.completed) or payload status.
      tags:
      - webhooks
      security:
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: webhooks_snippe_create
      description: |-
        Snippe payment webhook handler.

        How to configure:
        1. Webhook URL: https://your-api-domain.com/api/v1/webhooks/snippe/
        2. Set SNIPPE_WEBHOOK_SECRET in .env from dashboard: API Settings (webhook signing key).
        3. Snippe sends: X-Webhook-Signature (HMAC-SHA256), X-Webhook-Timestamp, X-Webhook-Event.
           Body: data.reference, data.external_reference, data.status, data.failure_reason.

        Verification: message = "{timestamp}.{raw_body}", HMAC-SHA256(secret, message) == signature.
        We find the MobileTransactionModel by snippe_reference, then update status from
        X-Webhook-Event (e.g. payment.completed) or payload status.
      tags:
      - webhooks
      security:
      - {}
      responses:
        '200':
          description: No response body
