          allOf:
          - $ref: '#/components/schemas/OwnerEnum'
          description: |-
            Who is responsible for fulfilling this requirement. Staff-owned requirements show a waiting state to students.

            * `student` - Student
            * `staff` - Staff
        scope:
          allOf:
          - $ref: '#/components/schemas/ScopeEnum'
          description: |-
            student-scoped answers are reused across applications

            * `application` - Application
            * `student` - Student
        document_type:
          type: string
          nullable: true
          description: Links to StudentDocumentModel.document_type for auto-fill.
            E.g. 'PASSPORT', 'BIRTH_CERT'
          maxLength: 50
        options:
          description: 'Options for SELECT type. E.g. [{"value": "male", "label":
            "Male"}]'
        accepted_file_types:
          description: E.g. [".pdf", ".jpg", ".png"]
        scheduled_date:
          type: string
          format: date-time
          nullable: true
        scheduled_location:
          type: string
          description: E.g. "Tanzania Immigration Office, Dar es Salaam"
          maxLength: 500
        rejection_reason:
          type: string
          description: Shown to student when requirement is rejected.
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
        created_at:
          type: string
          format: date-time
          readOnly: true
        latest_response:
          type: string
          readOnly: true
      required:
      - created_at
      - latest_response
      - response_type
      - title
